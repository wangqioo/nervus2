# Redis config for nervus2 Personal Model context graph
# Jetson Orin Nano: cap at 512MB

maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence: RDB snapshot every 15 min if >= 1 key changed
save 900 1
save 300 10

# AOF disabled — dimension state is reconstructible from snapshots
appendonly no

# Bind to all interfaces (Docker network)
bind 0.0.0.0
protected-mode no

# Logging
loglevel notice
logfile /var/log/redis.log

# Keyspace notifications — used by any watcher needing dimension update events
notify-keyspace-events "Kx"

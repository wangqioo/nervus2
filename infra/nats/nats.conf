# NATS JetStream config for nervus2
# Optimized for Jetson Orin Nano (~10MB memory footprint)

port: 4222
http_port: 8222

jetstream {
  store_dir: /data/jetstream

  # Jetson RAM budget: keep JetStream to 512MB max
  max_memory_store: 536870912    # 512 MB
  max_file_store:   5368709120   # 5 GB on disk
}

# Retain raw events for 7 days (matches V1 design)
# Streams are created by the application at startup.

log_time: true
log_file: /var/log/nats.log

# Cluster-ready for future multi-device sync (disabled for now)
# cluster { ... }
